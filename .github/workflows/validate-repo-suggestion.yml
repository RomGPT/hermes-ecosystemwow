name: Validate Repo Suggestion

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Single workflow handles labeling AND validation in one job. The old
# `auto-label-submissions.yml` design (add label, expect labeled event to
# cascade) silently failed because workflows triggered by GITHUB_TOKEN don't
# fire other workflows — issues #188 and #198 sat un-validated for 4d and 14h
# until manually re-labeled.

on:
  issues:
    types: [opened, edited, labeled]

# Serialize validation runs. Without this, two concurrent submissions create
# PRs that both branch from the same main SHA; merging the first leaves the
# second in conflict (no auto-rebase). PRs #193/#196 hit this on 2026-05-15
# and required manual close + re-label to recover.
concurrency:
  group: validate-repo-suggestion
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Decide whether this issue is a repo submission
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title || '';
            const labels = (context.payload.issue.labels || []).map(l => l.name);
            const titleMatches = title.startsWith('[Repo]') || title.startsWith('[Submission]');
            const labelMatches = labels.includes('repo-suggestion');
            const shouldRun = titleMatches || labelMatches;

            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.setOutput('has_label', labelMatches ? 'true' : 'false');
            console.log(`title=${title}, titleMatches=${titleMatches}, labelMatches=${labelMatches}, shouldRun=${shouldRun}`);

      - name: Ensure repo-suggestion label is present
        if: steps.gate.outputs.should_run == 'true' && steps.gate.outputs.has_label != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['repo-suggestion']
            });
            console.log(`Labeled #${context.payload.issue.number} as repo-suggestion`);

      - name: Checkout
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract repo URL from issue body
        if: steps.gate.outputs.should_run == 'true'
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Extract GitHub URL from the issue body
            const urlMatch = body.match(/https:\/\/github\.com\/([a-zA-Z0-9_.-]+\/[a-zA-Z0-9_.-]+)/);
            if (!urlMatch) {
              core.setFailed('No valid GitHub URL found in the issue body');
              return;
            }

            const repoPath = urlMatch[1].replace(/\/$/, '');
            const [owner, repo] = repoPath.split('/');

            // Extract suggested category
            const catMatch = body.match(/### Suggested Category\s*\n\s*(.+)/);
            const category = catMatch ? catMatch[1].trim() : 'Not sure';

            core.setOutput('owner', owner);
            core.setOutput('repo', repo);
            core.setOutput('category', category);
            core.setOutput('repo_path', repoPath);

            console.log(`Extracted: ${owner}/${repo}, category: ${category}`);

      - name: Fetch repo metadata from GitHub API
        if: steps.gate.outputs.should_run == 'true'
        id: metadata
        uses: actions/github-script@v7
        with:
          script: |
            const owner = '${{ steps.extract.outputs.owner }}';
            const repo = '${{ steps.extract.outputs.repo }}';

            try {
              const { data } = await github.rest.repos.get({ owner, repo });

              core.setOutput('stars', data.stargazers_count);
              core.setOutput('description', data.description || 'No description');
              core.setOutput('language', data.language || 'Unknown');
              core.setOutput('license', data.license?.spdx_id || 'None');
              core.setOutput('created_at', data.created_at);
              core.setOutput('updated_at', data.pushed_at);
              core.setOutput('is_fork', data.fork);
              core.setOutput('html_url', data.html_url);
              core.setOutput('topics', (data.topics || []).join(','));
              core.setOutput('exists', 'true');

              // Fetch README to widen relevance detection. The hermes/nous
              // mention check used to look only at description, which gave
              // false-positive warnings on legit plugins whose description
              // leads with the product pitch (e.g. klodi-plugin). Cap the
              // surfaced content so step outputs stay small.
              let readmeSnippet = '';
              try {
                const { data: readme } = await github.rest.repos.getReadme({ owner, repo });
                const decoded = Buffer.from(readme.content, 'base64').toString('utf-8');
                readmeSnippet = decoded.slice(0, 4000);
              } catch (e) {
                // No README is fine — just leave snippet empty.
              }
              core.setOutput('readme_snippet', readmeSnippet);

              // Infer category from description, name, and topics
              const text = [
                data.description || '',
                data.name || '',
                ...(data.topics || [])
              ].join(' ').toLowerCase();

              let category = 'Developer Tools'; // fallback

              // Order matters: most-specific signal wins. "Guides & Docs"
              // moved up because tutorials commonly mention every topic
              // (memory, skills, MCP, plugins...) in their description, and
              // the fact that something IS a tutorial outranks what it
              // describes. The plural-aware skills regex (`skills?`) catches
              // "Skills that teach..." which `\bskill\b` missed.
              if (data.owner?.login === 'NousResearch') {
                category = 'Core & Official';
              } else if (data.fork) {
                category = 'Forks & Derivatives';
              } else if (/\b(guide|tutorial|book|wiki|awesome|learning|course|handbook|chapters?)\b/.test(text)) {
                category = 'Guides & Docs';
              } else if (/\b(skills?|agentskills?|skill.?registry|skill.?factory)\b/.test(text)) {
                category = 'Skills & Skill Registries';
              } else if (/\b(memory|context|recall|remember|semantic search|knowledge graph|rag|retrieval|embedding|vector|long.?term)\b/.test(text)) {
                category = 'Memory & Context';
              } else if (/\b(gui|ui|dashboard|desktop|workspace|webui|web.?ui|frontend|interface|chat.?app|companion.?app|panel)\b/.test(text)) {
                category = 'Workspaces & GUIs';
              } else if (/\b(plugin|extension|bridge|adapter|connector|integration|webhook|mcp)\b/.test(text)) {
                category = 'Plugins & Extensions';
              } else if (/\b(multi.?agent|swarm|orchestrat|fleet|delegation|coordinator)\b/.test(text)) {
                category = 'Multi-Agent & Orchestration';
              } else if (/\b(deploy|docker|kubernetes|k8s|nix|systemd|infra|server|hosting|cloud|helm|portainer)\b/.test(text)) {
                category = 'Deployment & Infra';
              } else if (/\b(telegram|discord|slack|android|ios|mobile|whatsapp|cloudflare|browser)\b/.test(text)) {
                category = 'Integrations & Bridges';
              } else if (/\b(cybersecurity|finance|trading|medical|legal|blockchain|oracle|game|novel|creative|domain)\b/.test(text)) {
                category = 'Domain Applications';
              } else if (/\b(cli|linter|migration|token.?track|devtool|debug|test|benchmark|lint)\b/.test(text)) {
                category = 'Developer Tools';
              }

              core.setOutput('inferred_category', category);
              console.log(`${owner}/${repo}: ${data.stargazers_count} stars, ${data.language}, category: ${category}`);
            } catch (e) {
              core.setOutput('exists', 'false');
              core.setFailed(`Repo not found: ${owner}/${repo}`);
            }

      - name: Run validation checks
        if: steps.gate.outputs.should_run == 'true'
        id: validate
        uses: actions/github-script@v7
        env:
          REPO_OWNER: ${{ steps.extract.outputs.owner }}
          REPO_NAME: ${{ steps.extract.outputs.repo }}
          REPO_STARS: ${{ steps.metadata.outputs.stars }}
          REPO_CREATED: ${{ steps.metadata.outputs.created_at }}
          REPO_UPDATED: ${{ steps.metadata.outputs.updated_at }}
          REPO_IS_FORK: ${{ steps.metadata.outputs.is_fork }}
          REPO_DESC: ${{ steps.metadata.outputs.description }}
          REPO_LANGUAGE: ${{ steps.metadata.outputs.language }}
          REPO_LICENSE: ${{ steps.metadata.outputs.license }}
          REPO_HTML_URL: ${{ steps.metadata.outputs.html_url }}
          REPO_TOPICS: ${{ steps.metadata.outputs.topics }}
          REPO_README: ${{ steps.metadata.outputs.readme_snippet }}
        with:
          script: |
            const owner = process.env.REPO_OWNER;
            const repo = process.env.REPO_NAME;
            const stars = parseInt(process.env.REPO_STARS) || 0;
            const createdAt = new Date(process.env.REPO_CREATED);
            const isFork = process.env.REPO_IS_FORK === 'true';
            const description = process.env.REPO_DESC;
            const topics = (process.env.REPO_TOPICS || '').toLowerCase();
            const readmeSnippet = (process.env.REPO_README || '').toLowerCase();
            const hermesLaunch = new Date('2025-07-22');

            const issues = [];
            const warnings = [];

            // Check if already in repos.json
            const fs = require('fs');
            const repos = JSON.parse(fs.readFileSync('data/repos.json', 'utf-8'));
            const alreadyExists = repos.some(r => r.owner === owner && r.repo === repo);
            if (alreadyExists) {
              issues.push(`Already in the ecosystem map`);
            }

            // Filter checks
            if (isFork) {
              warnings.push(`This is a fork — we only include forks with meaningful changes`);
            }
            if (stars === 0) {
              warnings.push(`0 stars — we generally require at least 1 star`);
            }
            if (description === 'No description') {
              warnings.push(`No description set on the repo`);
            }
            if (createdAt < hermesLaunch) {
              warnings.push(`Created before Hermes Agent launch (${createdAt.toISOString().slice(0,10)})`);
            }

            // Check description, topics, and README snippet for hermes/nous
            // mention. Description-only check produced false-positive warnings
            // on legit plugins (e.g. klodi-plugin) whose description leads with
            // a product pitch but whose topics/README make the relationship
            // obvious.
            const haystack = [
              (description || '').toLowerCase(),
              topics,
              readmeSnippet,
            ].join(' ');
            const mentionsHermes = haystack.includes('hermes') || haystack.includes('nous');
            if (!mentionsHermes) {
              warnings.push(`Description, topics, and README don't mention "hermes" or "nous" — may not be related`);
            }

            const passed = issues.length === 0;
            const hasWarnings = warnings.length > 0;
            const alreadyInAtlas = issues.some(i => i.includes('Already in the ecosystem map'));

            core.setOutput('passed', passed ? 'true' : 'false');
            core.setOutput('already_in_atlas', alreadyInAtlas ? 'true' : 'false');
            core.setOutput('issues', JSON.stringify(issues));
            core.setOutput('warnings', JSON.stringify(warnings));

            let report = `## Automated Validation Report\n\n`;
            report += `| Field | Value |\n|-------|-------|\n`;
            report += `| **Repo** | [${owner}/${repo}](${process.env.REPO_HTML_URL}) |\n`;
            report += `| **Stars** | ${stars} |\n`;
            report += `| **Language** | ${process.env.REPO_LANGUAGE} |\n`;
            report += `| **License** | ${process.env.REPO_LICENSE} |\n`;
            report += `| **Created** | ${process.env.REPO_CREATED} |\n`;
            report += `| **Last push** | ${process.env.REPO_UPDATED} |\n`;
            report += `| **Fork** | ${isFork} |\n`;
            report += `| **Description** | ${description} |\n\n`;

            if (issues.length > 0) {
              report += `### Blocking Issues\n${issues.map(i => `- ${i}`).join('\n')}\n\n`;
            }
            if (warnings.length > 0) {
              report += `### Warnings\n${warnings.map(w => `- ${w}`).join('\n')}\n\n`;
            }
            if (passed && !hasWarnings) {
              report += `### Result: PASS\nAll checks passed. A PR will be created to add this repo.\n`;
            } else if (passed && hasWarnings) {
              report += `### Result: PASS with warnings\nNo blocking issues, but please review the warnings above. A PR will be created.\n`;
            } else {
              report += `### Result: BLOCKED\nThis repo cannot be auto-added due to the issues above. A maintainer will review manually.\n`;
            }

            core.setOutput('report', report);

      - name: Comment validation report on issue
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.validate.outputs.report }}
        with:
          script: |
            const report = process.env.REPORT.replace(/\\n/g, '\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });

      - name: Close issue if already in atlas
        if: steps.validate.outputs.already_in_atlas == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Auto-closing — this repo is already in the ecosystem map. Reopen if you believe this is a mistake.'
            });

      - name: Create PR to add repo (if passed)
        if: steps.validate.outputs.passed == 'true'
        uses: actions/github-script@v7
        env:
          REPO_OWNER: ${{ steps.extract.outputs.owner }}
          REPO_NAME: ${{ steps.extract.outputs.repo }}
          REPO_STARS: ${{ steps.metadata.outputs.stars }}
          REPO_DESC: ${{ steps.metadata.outputs.description }}
          REPO_HTML_URL: ${{ steps.metadata.outputs.html_url }}
          REPO_CATEGORY: ${{ steps.extract.outputs.category }}
          INFERRED_CATEGORY: ${{ steps.metadata.outputs.inferred_category }}
        with:
          script: |
            const owner = process.env.REPO_OWNER;
            const repo = process.env.REPO_NAME;
            const stars = parseInt(process.env.REPO_STARS) || 0;
            const description = process.env.REPO_DESC;
            const htmlUrl = process.env.REPO_HTML_URL;
            // Use user-suggested category if provided, otherwise use inferred
            let category = process.env.REPO_CATEGORY;
            if (!category || category === 'Not sure') {
              category = process.env.INFERRED_CATEGORY || 'Developer Tools';
            }

            // Always source repos.json from the LATEST main via API, not from
            // the workflow's local checkout. The checkout happens at the start
            // of the run; if any other PR merges to main during this run
            // (auto-PRs from concurrent issue submissions, manual merges,
            // etc.) the local copy is stale. Committing stale content on a
            // branch based on latest main means the squash-merge later
            // silently drops everything that landed in the gap. PR #89 hit
            // exactly this and lost AxDSan/mnemosyne; PR #79 (mem0) is still
            // DIRTY for the same reason.
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'data/repos.json',
              ref: 'main'
            });
            const repos = JSON.parse(
              Buffer.from(file.content, 'base64').toString('utf-8')
            );

            // Add new repo
            const newRepo = {
              owner,
              repo,
              name: repo,
              description: description.slice(0, 200),
              stars,
              url: htmlUrl,
              official: owner === 'NousResearch',
              category
            };

            repos.push(newRepo);

            // Write updated repos.json
            const branch = `add-repo-${owner}-${repo}`.toLowerCase().replace(/[^a-z0-9-]/g, '-');

            // Get current main SHA
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main'
            });

            // Delete existing branch if present (from previous failed runs)
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
            } catch (e) {
              // Branch doesn't exist — that's fine
            }

            // Create branch
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha: ref.object.sha
            });

            // Update file on new branch. createOrUpdateFileContents requires
            // the file's current SHA on `ref: branch` — same as on main since
            // the branch was just created from main and we haven't committed
            // anything to it yet.
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'data/repos.json',
              message: `Add ${owner}/${repo} to ecosystem map\n\nSuggested in #${context.issue.number}`,
              content: Buffer.from(JSON.stringify(repos, null, 2) + '\n').toString('base64'),
              sha: file.sha,
              branch
            });

            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Add ${owner}/${repo} (${stars} stars) to ${category}`,
              body: `Adds [${owner}/${repo}](${htmlUrl}) to the ecosystem map.\n\n**Stars:** ${stars}\n**Category:** ${category}\n**Description:** ${description}\n\nCloses #${context.issue.number}\n\n> Note: This PR only updates repos.json. The HTML map will need a manual update to include the new chip, or will be picked up in the next full refresh.`,
              head: branch,
              base: 'main'
            });

            // Merge the validator PR inside this serialized workflow instead
            // of delegating to native auto-merge immediately after PR creation.
            // Native auto-merge has repeatedly rejected fresh validator PRs as
            // "unstable" while preview/check contexts are still materializing;
            // the job then exits, the next queued submission branches from the
            // same main, and the open PR stack becomes DIRTY once any earlier
            // add-repo PR lands. Keeping this workflow alive until checks are
            // successful preserves the serialization invariant: the next repo
            // submission only reads main after this one has either merged or
            // produced a single deduped blocker issue.
            let mergedByWorkflow = false;
            let mergeState = 'UNKNOWN';
            let checkSummary = 'pending';
            let blockerReason = '';

            for (let i = 0; i < 60; i++) {
              const { repository } = await github.graphql(
                `query($owner: String!, $repo: String!, $num: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $num) {
                      mergeStateStatus
                      mergeable
                      isDraft
                      commits(last: 1) {
                        nodes {
                          commit {
                            statusCheckRollup {
                              contexts(first: 50) {
                                nodes {
                                  __typename
                                  ... on CheckRun { name status conclusion }
                                  ... on StatusContext { context state }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }`,
                { owner: context.repo.owner, repo: context.repo.repo, num: pr.number }
              );

              const pull = repository.pullRequest;
              mergeState = pull.mergeStateStatus || 'UNKNOWN';
              const contexts = pull.commits.nodes[0]?.commit?.statusCheckRollup?.contexts?.nodes || [];
              const blocking = contexts.filter(c => {
                if (c.__typename === 'CheckRun') {
                  return c.status !== 'COMPLETED' || !['SUCCESS', 'SKIPPED', 'NEUTRAL'].includes(c.conclusion);
                }
                if (c.__typename === 'StatusContext') {
                  return c.state !== 'SUCCESS';
                }
                return false;
              });
              checkSummary = contexts.length
                ? `${contexts.length - blocking.length}/${contexts.length} passing`
                : 'no check contexts yet';

              console.log(`PR #${pr.number}: mergeState=${mergeState}, mergeable=${pull.mergeable}, checks=${checkSummary}`);

              if (pull.isDraft) {
                blockerReason = 'PR is draft';
                break;
              }
              if (mergeState === 'DIRTY') {
                blockerReason = 'PR is dirty/conflicted';
                break;
              }
              if (contexts.length > 0 && blocking.length === 0 && ['CLEAN', 'HAS_HOOKS', 'UNSTABLE'].includes(mergeState)) {
                try {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    merge_method: 'squash',
                    commit_title: `Add ${owner}/${repo} to Atlas ecosystem (#${pr.number})`
                  });
                  mergedByWorkflow = true;
                  console.log(`Merged PR #${pr.number} after checks passed.`);
                  break;
                } catch (e) {
                  blockerReason = `Merge API failed: ${e.message}`;
                  console.log(blockerReason);
                }
              }

              await new Promise(r => setTimeout(r, 30000));
            }

            if (!mergedByWorkflow) {
              if (!blockerReason) {
                blockerReason = `Timed out waiting for mergeable green PR; mergeState=${mergeState}, checks=${checkSummary}`;
              }

              const issueTitle = `[Workflow] Validator PR #${pr.number} needs manual review`;
              const existing = await github.rest.search.issuesAndPullRequests({
                q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${issueTitle}"`
              });
              const body = `Validator PR #${pr.number} for ${owner}/${repo} did not auto-merge.\n\n**Merge state at attempt:** \`${mergeState}\`\n**Checks:** \`${checkSummary}\`\n**Reason:** \`${blockerReason}\`\n\n**Action:** review and merge the PR manually, or close it if invalid.`;

              if (existing.data.items.length === 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issueTitle,
                  body,
                  labels: ['workflow-issue']
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.data.items[0].number,
                  body: `Still blocked.\n\n${body}`
                });
              }
              core.warning(`PR #${pr.number} did not auto-merge: ${blockerReason}`);
            }

            // Comment on the source issue with the PR link and outcome.
            const mergeNote = mergedByWorkflow
              ? '\n\nThe validator workflow merged the PR after checks passed.'
              : '\n\nThe PR was created, but did not auto-merge; a deduped workflow issue tracks manual review.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `PR created: #${pr.number}\n\nOnce merged, this repo will appear in the ecosystem map.${mergeNote}`
            });
