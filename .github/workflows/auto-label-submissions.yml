name: Auto-Label Submissions

# The suggest-repo.yml issue-form template declares
# `labels: ["repo-suggestion"]`, but in practice GitHub does not always
# attach those labels before `issues.opened` fires — and `validate-repo-suggestion`
# only runs when the label is present, so submissions can sit un-validated
# until a human notices (e.g. issues #115, #39 — silent for 5 and 14 days
# respectively before manual labeling on 2026-05-01).
#
# This is a tiny pre-step: on every new issue whose title looks like a
# repo submission, attach the `repo-suggestion` label. The existing
# `validate-repo-suggestion` workflow then fires on the `labeled` event.

on:
  issues:
    types: [opened]

jobs:
  label:
    if: |
      startsWith(github.event.issue.title, '[Repo]') ||
      startsWith(github.event.issue.title, '[Submission]')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Apply repo-suggestion label
        uses: actions/github-script@v7
        with:
          script: |
            const existing = (context.payload.issue.labels || []).map(l => l.name);
            if (existing.includes('repo-suggestion')) {
              console.log(`#${context.payload.issue.number} already labeled — no-op`);
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['repo-suggestion']
            });
            console.log(`Labeled #${context.payload.issue.number} as repo-suggestion`);
